# The moe expert-team roster — the source of truth the router reasons over.
# Descriptions drive routing (the host model picks an expert by reading them), so write them
# to say what each expert *knows*. Then `npx moe build` turns the materials into curated,
# cited knowledge and compiles the per-host outputs under dist/.

name: demo-team
experts:
  - name: cardiology
    description: >-
      Clinical cardiology — cardiac anatomy, the heart's chambers and valves, valvular
      disease (stenosis and regurgitation), and blood flow through the heart. Route here for
      heart / cardiovascular questions.
    materials:
      - path: experts/cardiology/materials/valves.md
        title: Cardiac Valves Primer
    tools: [Read, Grep, Glob]
    # model: sonnet        # optional Claude Code model hint

  - name: nutrition
    description: >-
      Human nutrition — macronutrients, dietary fats and cholesterol, sodium and blood
      pressure, and heart-healthy eating patterns (Mediterranean, DASH). Route here for
      diet, food, and nutrition questions.
    materials:
      - path: experts/nutrition/materials/heart_healthy_diet.md
        title: Nutrition Essentials
    tools: [Read, Grep, Glob]
