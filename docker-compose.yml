# Optional local stack: the dashboard + a local Qdrant (for offline/dev use).
# For production, point QDRANT_URL/KEY at Qdrant Cloud and drop the qdrant service.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  dashboard:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8848:8848"
    environment:
      QDRANT_URL: http://qdrant:6333
      AWS_REGION: ${AWS_REGION:-us-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - moe_data:/data

volumes:
  qdrant_data:
  moe_data:
